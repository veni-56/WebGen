{% extends 'base.html' %}
{% block title %}Verify OTP — ShopWave{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card border-0 shadow-sm mt-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock fs-1 text-success"></i>
          <h4 class="fw-bold mt-2">Enter OTP</h4>
          <p class="text-muted small">
            A 6-digit OTP was sent to
            <strong>{{ mobile[:4] }}****{{ mobile[-2:] }}</strong>
          </p>
        </div>

        <form method="POST" action="{{ url_for('auth.otp_verify') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">6-Digit OTP</label>
            <input type="text" name="code" class="form-control form-control-lg text-center fw-bold ls-wide"
                   placeholder="• • • • • •"
                   pattern="\d{6}" maxlength="6" minlength="6"
                   inputmode="numeric" autocomplete="one-time-code"
                   required autofocus />
            <div class="form-text text-center">OTP expires in 10 minutes.</div>
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-success btn-lg fw-semibold">
              <i class="bi bi-check-circle me-1"></i>Verify & Login
            </button>
          </div>
        </form>

        <div class="text-center">
          <p class="text-muted small mb-1">Didn't receive the OTP?</p>
          <a href="{{ url_for('auth.otp_request') }}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-arrow-repeat me-1"></i>Resend OTP
          </a>
        </div>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
