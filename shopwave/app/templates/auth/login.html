{% extends 'base.html' %}
{% block title %}Login — ShopWave{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-bag-heart-fill text-primary fs-1"></i>
          <h4 class="fw-bold mt-2">Welcome back</h4>
          <p class="text-muted small">Sign in to your ShopWave account</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          Don't have an account?
          <a href="{{ url_for('auth.signup') }}" class="text-primary fw-semibold">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
