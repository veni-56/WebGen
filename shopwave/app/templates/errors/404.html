{% extends 'base.html' %}
{% block title %}404 Not Found — ShopWave{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="display-1 fw-bold text-muted">404</div>
  <i class="bi bi-emoji-frown display-3 text-muted mb-3 d-block"></i>
  <h2 class="fw-bold">Page Not Found</h2>
  <p class="text-muted lead">The page you're looking for doesn't exist or has been moved.</p>
  <div class="d-flex justify-content-center gap-2 mt-4">
    <a href="{{ url_for('customer.index') }}" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Go Home
    </a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Go Back
    </a>
  </div>
</div>
{% endblock %}
