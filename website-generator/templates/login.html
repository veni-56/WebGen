{% extends 'base.html' %}
{% block title %}Login — WebGen{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡ WebGen</div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Login to access your projects</p>
    <form method="POST" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" required autofocus/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn-submit">Login</button>
    </form>
    <p class="auth-switch">No account? <a href="{{ url_for('signup') }}">Sign up free</a></p>
  </div>
</div>
{% endblock %}
