{% extends 'base.html' %}
{% block title %}Sign Up — Meesho{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-1 text-center"><i class="bi bi-bag-heart-fill text-primary"></i> Meesho</h4>
          <p class="text-center text-muted mb-4">Create your account</p>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required minlength="6"/>
            </div>
            <div class="mb-4">
              <label class="form-label">I want to</label>
              <select name="role" class="form-select">
                <option value="customer">Shop (Customer)</option>
                <option value="seller">Sell Products (Seller)</option>
              </select>
            </div>
            <button class="btn btn-primary w-100 rounded-pill">Create Account</button>
          </form>
          <hr/>
          <p class="text-center mb-0 small">Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
