# nginx.conf — Production reverse proxy for WebGen Builder
# Handles: static file serving, gzip, cache headers, proxy to Flask

user  nginx;
worker_processes  auto;
error_log  /data/logs/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /data/logs/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml font/woff2;

    # ── Upload size limit ─────────────────────────────────────────────────────
    client_max_body_size 32m;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m   rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=upload:10m rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream Flask app ────────────────────────────────────────────────────
    upstream flask_app {
        server web:4000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (comment out if not using HTTPS) ───────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS (replace with your cert paths) ───────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           SAMEORIGIN                                     always;
        add_header X-Content-Type-Options    nosniff                                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

        # ── Builder UI static files ───────────────────────────────────────────
        # Served directly by nginx — no Flask round-trip
        root /app/ui;
        index index.html;

        location = / {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── Published sites (long-lived cache) ───────────────────────────────
        location /site/ {
            alias /data/published/;
            # Rewrite /site/<pid>[/...] → /data/published/<pid>/latest/[...]
            rewrite ^/site/([^/]+)/?(.*)$ /$1/latest/$2 break;

            expires 5m;
            add_header Cache-Control "public, max-age=300, must-revalidate";

            # Versioned assets get long cache
            location ~* \.(css|js|woff2?|png|jpg|jpeg|webp|gif|svg|ico)$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            try_files $uri $uri/ =404;
        }

        # ── Slug-based public sites ───────────────────────────────────────────
        location /p/ {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── Uploads (medium cache) ────────────────────────────────────────────
        location /uploads/ {
            alias /data/uploads/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            # Security: only serve image types
            location ~* \.(png|jpg|jpeg|gif|webp|svg)$ { }
            location / { return 403; }
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── Upload endpoint (upload rate limit) ──────────────────────────────
        location /api/upload {
            limit_req zone=upload burst=10 nodelay;
            client_max_body_size 32m;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── SSE stream (long-lived connection) ───────────────────────────────
        location /api/admin/stream {
            proxy_pass          http://flask_app;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
            include /etc/nginx/proxy_params;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── Health check (no rate limit, internal use) ────────────────────────
        location /health {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
            access_log off;
        }

        # ── Builder UI assets ─────────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # ── Everything else → Flask ───────────────────────────────────────────
        location / {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }
    }

    # ── HTTP-only server (use this block instead if no HTTPS) ────────────────
    # Uncomment and remove the HTTPS server block above for local/dev use.
    #
    # server {
    #     listen 80;
    #     server_name _;
    #     client_max_body_size 32m;
    #
    #     location /site/ {
    #         alias /data/published/;
    #         rewrite ^/site/([^/]+)/?(.*)$ /$1/latest/$2 break;
    #         try_files $uri $uri/ =404;
    #     }
    #
    #     location /uploads/ {
    #         alias /data/uploads/;
    #     }
    #
    #     location / {
    #         proxy_pass http://flask_app;
    #         include /etc/nginx/proxy_params;
    #     }
    # }
}
