<!DOCTYPE html>
<html lang="en" x-data="authPage()" x-init="init()">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — WebGen Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-950 via-indigo-950 to-gray-950 flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 to-pink-500 flex items-center justify-center text-white font-black text-xl mx-auto mb-3">W</div>
    <h1 class="text-2xl font-black text-white">WebGen Builder</h1>
    <p class="text-gray-400 text-sm mt-1">Sign in to your account</p>
  </div>
  <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
    <div x-show="error" x-cloak class="mb-4 p-3 rounded-xl bg-red-500/20 border border-red-500/30 text-red-300 text-sm" x-text="error"></div>
    <form @submit.prevent="login()" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Email</label>
        <input type="email" x-model="email" required autocomplete="email"
               class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-500 focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-400/20 transition-all"
               placeholder="you@example.com"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
        <input type="password" x-model="password" required autocomplete="current-password"
               class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-500 focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-400/20 transition-all"
               placeholder="••••••••"/>
      </div>
      <button type="submit" :disabled="loading"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-violet-500 to-pink-500 text-white font-bold text-sm hover:opacity-90 disabled:opacity-60 transition-all mt-2">
        <span x-text="loading ? 'Signing in…' : 'Sign In'"></span>
      </button>
    </form>
    <p class="text-center text-gray-500 text-sm mt-6">
      Don't have an account?
      <a href="/register" class="text-violet-400 hover:text-violet-300 font-semibold">Create one</a>
    </p>
  </div>
</div>
<script>
function authPage() {
  return {
    email: '', password: '', loading: false, error: '',
    init() {
      // If already logged in, redirect to builder
      fetch('/api/auth/me').then(r => r.json()).then(d => {
        if (d.success) window.location.href = '/';
      }).catch(() => {});
    },
    async login() {
      this.loading = true; this.error = '';
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email: this.email, password: this.password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('wbs_csrf', data.data.csrf_token);
          window.location.href = '/';
        } else {
          this.error = data.error || 'Login failed';
        }
      } catch(e) { this.error = 'Server offline'; }
      this.loading = false;
    }
  };
}
</script>
</body>
</html>
