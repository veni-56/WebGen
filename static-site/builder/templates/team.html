<section class="py-20 px-4 bg-gradient-to-br from-indigo-50 via-white to-pink-50 dark:from-gray-900 dark:via-gray-950 dark:to-gray-900 text-center border-b border-gray-100 dark:border-gray-800">
  <div class="max-w-3xl mx-auto {{reveal_class}}">
    <span class="text-primary text-sm font-semibold uppercase tracking-wider">People</span>
    <h1 class="text-4xl md:text-5xl font-black mt-2 mb-4 dark:text-white">Meet the <span class="gradient-text">Team</span></h1>
    <p class="text-lg text-gray-500 dark:text-gray-400">The passionate people behind {{site_name}} — engineers, designers, and builders who love what they do.</p>
  </div>
</section>

<section class="py-24 px-4">
  <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    {{#each team}}
    <article class="{{reveal_class}} card-hover card-gradient-border group bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 rounded-2xl p-7 text-center">
      <div class="w-20 h-20 rounded-full btn-gradient flex items-center justify-center text-white font-black text-2xl mx-auto mb-4 group-hover:scale-110 transition-transform" aria-hidden="true">{{initials}}</div>
      <h2 class="font-black text-base dark:text-white">{{name}}</h2>
      <div class="text-xs text-primary font-semibold mt-0.5 mb-3">{{role}}</div>
      <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed">{{bio}}</p>
    </article>
    {{/each}}
  </div>
</section>
