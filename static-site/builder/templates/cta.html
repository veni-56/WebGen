<section class="py-24 px-4 text-center" aria-labelledby="cta-heading">
  <div class="max-w-2xl mx-auto {{reveal_class}}">
    <h2 id="cta-heading" class="text-4xl md:text-5xl font-black mb-4 dark:text-white">
      Ready to <span class="gradient-text">Get Started?</span>
    </h2>
    <p class="text-gray-500 dark:text-gray-400 mb-10">
      Join 10,000+ teams already building with {{site_name}}. Free plan available — no credit card required.
    </p>
    <div class="flex flex-wrap gap-4 justify-center">
      <a href="{{cta_link}}" class="btn-gradient px-8 py-3.5 rounded-full font-bold focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:ring-offset-2">{{cta_text}}</a>
      <a href="about.html" class="btn-outline-primary px-8 py-3.5 rounded-full font-bold focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:ring-offset-2">Meet the Team →</a>
    </div>
  </div>
</section>
