<section class="py-14 bg-gray-50 dark:bg-gray-900 border-y border-gray-100 dark:border-gray-800" aria-label="Statistics">
  <div class="max-w-5xl mx-auto px-4 stats-row grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
    {{#each stats}}
    <div class="{{reveal_class}}">
      <div class="text-4xl font-black text-primary counter-val" data-target="{{value}}" data-suffix="{{suffix}}">{{value}}{{suffix}}</div>
      <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{label}}</div>
    </div>
    {{/each}}
  </div>
</section>
