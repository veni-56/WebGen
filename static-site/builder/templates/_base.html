<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{{page_description}}"/>
  <meta property="og:title"       content="{{page_title}} — {{site_name}}"/>
  <meta property="og:description" content="{{page_description}}"/>
  <meta property="og:type"        content="website"/>
  <title>{{page_title}} — {{site_name}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link href="https://fonts.googleapis.com/css2?family={{font_url}}:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{font-family:'{{font}}',sans-serif}
    :root{--primary:{{primary_color}};--secondary:{{secondary_color}};--primary-rgb:{{primary_rgb}};--secondary-rgb:{{secondary_rgb}}}
  </style>
  {{plugin_head}}
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">
{{#if scroll_progress}}<div id="scrollProgress"></div>{{/if}}
{{>_navbar}}
{{page_body}}
{{>_footer}}
{{plugin_body}}
<script src="script.js"></script>
{{plugin_scripts}}
</body>
</html>
