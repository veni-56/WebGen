<section class="relative overflow-hidden py-24 md:py-36 px-4" aria-labelledby="hero-heading">
  <div class="absolute inset-0 bg-gradient-to-br from-indigo-50 via-white to-pink-50 dark:from-gray-900 dark:via-gray-950 dark:to-gray-900"></div>
  <div class="absolute top-20 left-1/4 w-80 h-80 rounded-full opacity-20 blur-3xl pointer-events-none" style="background:var(--primary)"></div>
  <div class="absolute bottom-10 right-1/4 w-60 h-60 rounded-full opacity-15 blur-3xl pointer-events-none" style="background:var(--secondary)"></div>
  <div class="relative max-w-5xl mx-auto text-center">
    <span class="{{reveal_class}} inline-block bg-primary-10 border border-primary-15 text-primary text-xs font-semibold px-4 py-1.5 rounded-full mb-5 tracking-wide uppercase">✨ Trusted by 10,000+ teams worldwide</span>
    <h1 id="hero-heading" class="{{reveal_class}} text-5xl md:text-7xl font-black leading-tight mb-6 dark:text-white">
      {{hero_line1}}<br><span class="gradient-text">{{hero_line2}}</span>
    </h1>
    <p class="{{reveal_class}} text-lg md:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto mb-10">{{description}}</p>
    <div class="{{reveal_class}} flex flex-wrap gap-4 justify-center">
      <a href="{{cta_link}}" class="btn-gradient px-8 py-3.5 rounded-full font-bold text-base focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:ring-offset-2" aria-label="{{cta_text}}">{{cta_text}}</a>
      <a href="about.html" class="btn-outline-primary px-8 py-3.5 rounded-full font-bold text-base focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:ring-offset-2">Learn More →</a>
    </div>
  </div>
</section>
