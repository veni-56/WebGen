<section class="py-20 px-4 bg-gradient-to-br from-indigo-50 via-white to-pink-50 dark:from-gray-900 dark:via-gray-950 dark:to-gray-900 text-center border-b border-gray-100 dark:border-gray-800">
  <div class="max-w-3xl mx-auto {{reveal_class}}">
    <span class="text-primary text-sm font-semibold uppercase tracking-wider">Insights</span>
    <h1 class="text-4xl md:text-5xl font-black mt-2 mb-4 dark:text-white">Our <span class="gradient-text">Blog</span></h1>
    <p class="text-lg text-gray-500 dark:text-gray-400">Thoughts, insights, and expertise from our team.</p>
  </div>
</section>

<section class="py-24 px-4">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{#each blog_posts}}
    <article class="{{reveal_class}} card-hover bg-white dark:bg-gray-900 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-800">
      <img src="https://picsum.photos/seed/{{seed}}/600/300" alt="{{title}}" class="w-full h-44 object-cover" loading="lazy"/>
      <div class="p-5">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-xs font-semibold text-primary bg-primary-10 px-2.5 py-0.5 rounded-full">{{tag}}</span>
          <time class="text-xs text-gray-400" datetime="{{datetime}}">{{date}}</time>
        </div>
        <h2 class="font-black text-base mb-2 leading-snug dark:text-white">{{title}}</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed mb-4">{{excerpt}}</p>
        <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-800">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full btn-gradient flex items-center justify-center text-white text-xs font-bold" aria-hidden="true">{{initials}}</div>
            <span class="text-xs text-gray-500">{{author}}</span>
          </div>
          <a href="#" class="text-xs font-semibold text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-[var(--primary)] rounded" aria-label="Read {{title}}">Read →</a>
        </div>
      </div>
    </article>
    {{/each}}
  </div>
</section>
